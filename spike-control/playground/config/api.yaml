---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: ingress-http
spec:
  address: http://0.0.0.0:8081
  services:
    upstream:
      address: http://backend
      routes:
        - config:
            destinationPath: /anything/echo/
  policies:
    - policyRef:
        name: spike-control-v1-0-impl
        namespace: default
      config:
        requests: 5
        millis: 1000
        delay: 100
        maxAttempts: 3
