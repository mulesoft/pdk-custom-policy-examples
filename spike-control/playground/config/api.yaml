---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: ingress-http
spec:
  address: http://0.0.0.0:8081
  services:
    upstream:
      address: http://backend
      routes:
        - config:
            destinationPath: /anything/echo/
  policies:
    - policyRef:
        name: spike-control-flex-v1-0 # This value will be overriden during 'make run' execution
        namespace: default
      config:
        requests: 2
        millis: 10000
        maxAttempts: 0
        delay: 0
