---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: Spike Control Policy
    description: >-
      Limits how many requests reach the backend in a time window, with optional
      delays and retries when the limit is reached.
    category: Custom
    metadata/interfaceScope: api,resource
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    requests:
      type: integer
      description: Maximum requests allowed per time window.
    millis:
      type: integer
      description: Length of the time window in milliseconds.
    delay:
      type: integer
      description: Delay between queue retry attempts when over limit (milliseconds).
    maxAttempts:
      type: integer
      description: Maximum queue/retry attempts when over limit (0 disables queuing).
  required:
    - requests
    - millis
    - delay
    - maxAttempts
