---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: stop-iteration
    category: Custom
    metadata/interfaceScope: api,resource
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    modifyRequest:
      type: boolean
      default: false
    modifyResponse:
      type: boolean
      default: false
    bodyPrefix:
      type: string
      default: "modified"
  required:
    - modifyRequest
    - modifyResponse
    - bodyPrefix
